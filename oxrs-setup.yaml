                        {% endif %}
                      {% else %}
                        {% set _ = tile_update.update({'state': 'on' if is_state(entity, 'on') else 'off'}) %}
                      {% endif %}
                      {{ {'tiles': [tile_update]} | to_json(ensure_ascii=False) }}
      - conditions:

                  value_template: "{{ repeat.item.entity and repeat.item.entity != '' and page_enabled_map.get(repeat.item.screen, page_enabled_map.get(repeat.item.screen | string, false)) }}"
                - action: mqtt.publish
                  data:
                    topic: "oxrs/cmnd/{{ device_client_id }}"
                    payload: >-
                      {% set entity = repeat.item.entity %}
                      {% set domain = entity.split('.')[0] %}
                      {% set tile_update = {
                        'screen': repeat.item.screen,
                        'tile': repeat.item.tile
                      } %}
                      {% if domain in ['sensor', 'binary_sensor'] %}
                        {% set sensor_text = (states(entity)

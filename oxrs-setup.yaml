actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.id in ['ha_start', 'panel_lwt', 'automation_reloaded'] }}
        sequence:
          - action: mqtt.publish
            data:
              topic: "oxrs/conf/{{ device_client_id }}"
              retain: true
              payload: >-
                {{ {'screens': []} | to_json(ensure_ascii=False) }}
          - delay:
              milliseconds: 100
          - action: mqtt.publish
            data:
              topic: "oxrs/conf/{{ device_client_id }}"
              retain: true
              payload: >-
                {% set ns = namespace(screens=[]) %}
                {% for screen in range(1, 6) %}
                  {% if page_enabled_map.get(screen, page_enabled_map.get(screen | string, false)) %}
                    {% set tiles = namespace(items=[]) %}
                    {% for tile in tile_defs | selectattr('screen', 'equalto', screen) %}
                      {% if tile.entity and tile.entity != '' %}
                        {% set entity = tile.entity %}
                        {% set domain = entity.split('.')[0] %}
                        {% set style = 'button' %}
                        {% if domain in ['sensor', 'binary_sensor'] %}
                          {% set style = 'indicator' %}
                        {% elif domain == 'cover' %}
                          {% set style = 'buttonUpDownLevel' %}
                        {% elif domain == 'switch' %}
                          {% set style = 'button' %}
                        {% elif domain == 'climate' %}
                          {% set style = 'thermostat' %}
                        {% elif domain == 'light' %}
                          {% set supported_modes = state_attr(entity, 'supported_color_modes') or [] %}
                          {% set has_rgb = 'hs' in supported_modes or 'xy' in supported_modes or 'rgb' in supported_modes %}
                          {% set has_ct = 'color_temp' in supported_modes %}
                          {% if has_rgb and has_ct %}
                            {% set style = 'colorPickerRgbCct' %}
                          {% elif has_rgb %}
                            {% set style = 'colorPickerRgb' %}
                          {% elif has_ct %}
                            {% set style = 'colorPickerCct' %}
                          {% elif supported_modes | length > 1 or (supported_modes | length == 1 and supported_modes[0] != 'onoff') %}
                            {% set style = 'buttonUpDownLevel' %}
                          {% else %}
                            {% set style = 'button' %}
                          {% endif %}
                        {% endif %}
                        {% set area_label = area_name(entity) %}
                        {% set use_area_label = (domain == 'climate' and thermostat_use_area_name) or (domain == 'sensor' and state_attr(entity, 'device_class') == 'temperature' and temperature_sensor_use_area_name) %}
                        {% set raw_tile_label = area_label if use_area_label and area_label else (state_attr(entity, 'friendly_name') or entity) %}
                        {% set tile_label = (raw_tile_label
                          | replace('Ä', 'Ae')
                          | replace('Ö', 'Oe')
                          | replace('Ü', 'Ue')
                          | replace('ä', 'ae')
                          | replace('ö', 'oe')
                          | replace('ü', 'ue')
                          | replace('ß', 'ss')) %}
                        {% set icon_value = '_thermostat' if domain == 'climate' else '_bulb' if domain == 'light' else state_attr(entity, 'icon') %}
                        {% if style == 'buttonUpDownLevel' and icon_value %}
                          {% set tile_payload = {'tile': tile.tile, 'style': style, 'label': tile_label, 'tag': entity, 'icon': icon_value, 'levelBottom': 0, 'levelTop': 100} %}
                        {% elif style == 'buttonUpDownLevel' %}
                          {% set tile_payload = {'tile': tile.tile, 'style': style, 'label': tile_label, 'tag': entity, 'levelBottom': 0, 'levelTop': 100} %}
                        {% elif icon_value %}
                          {% set tile_payload = {'tile': tile.tile, 'style': style, 'label': tile_label, 'tag': entity, 'icon': icon_value} %}
                        {% else %}
                          {% set tile_payload = {'tile': tile.tile, 'style': style, 'label': tile_label, 'tag': entity} %}
                        {% endif %}
                        {% set tiles.items = tiles.items + [tile_payload] %}
                      {% endif %}
                    {% endfor %}
                    {% if tiles.items | length > 0 %}
                      {% set ns.screens = ns.screens + [
                        {
                          'screen': screen,
                          'label': (page_labels[screen]
                            | replace('Ä', 'Ae')
                            | replace('Ö', 'Oe')
                            | replace('Ü', 'Ue')
                            | replace('ä', 'ae')
                            | replace('ö', 'oe')
                            | replace('ü', 'ue')
                            | replace('ß', 'ss')),
                          'screenLayout': {'horizontal': 2, 'vertical': 3},
                          'tiles': tiles.items
                        }
                      ] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ {'screens': ns.screens} | to_json(ensure_ascii=False) }}
          - action: mqtt.publish
            data:
              topic: "oxrs/cmnd/{{ device_client_id }}"
              payload: >-
                {{ {'screen': {'load': 1}} | to_json(ensure_ascii=False) }}
          - delay:
              milliseconds: 500
          - repeat:
              for_each: "{{ tile_defs }}"
              sequence:
                - condition: template
                  value_template: "{{ repeat.item.entity and repeat.item.entity != '' and page_enabled_map.get(repeat.item.screen, page_enabled_map.get(repeat.item.screen | string, false)) }}"
                - action: mqtt.publish
                  data:
                    topic: "oxrs/cmnd/{{ device_client_id }}"
                    payload: >-
                      {% set entity = repeat.item.entity %}
                      {% set domain = entity.split('.')[0] %}
                      {% set tile_update = namespace(value={
                        'screen': repeat.item.screen,
                        'tile': repeat.item.tile
                      }) %}
                      {% if domain in ['sensor', 'binary_sensor'] %}
                        {% set sensor_text = (states(entity)
                          | replace('Ä', 'Ae')
                          | replace('Ö', 'Oe')
                          | replace('Ü', 'Ue')
                          | replace('ä', 'ae')
                          | replace('ö', 'oe')
                          | replace('ü', 'ue')
                          | replace('ß', 'ss')) %}
                        {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'text': sensor_text} %}
                      {% elif domain == 'cover' %}
                        {% set cover_level = state_attr(entity, 'current_position') %}
                        {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'state': 'on' if is_state(entity, 'open') else 'off', 'level': (cover_level | int(0)) if cover_level is not none else 0, 'subLabel': states(entity)} %}
                      {% elif domain == 'climate' %}
                        {% set target_temp = state_attr(entity, 'temperature') %}
                        {% set current_temp = state_attr(entity, 'current_temperature') %}
                        {% set target_value = ((target_temp * 10) | int(0)) if target_temp is not none else 200 %}
                        {% set current_value = ((current_temp * 10) | int(0)) if current_temp is not none else target_value %}
                        {% set mode = 1 if is_state(entity, 'off') else 2 %}
                        {% set tile_update.value = {
                          'screen': repeat.item.screen,
                          'tile': repeat.item.tile,
                          'number': {
                            'value': (target_temp | round(1) | string) if target_temp is not none else '',
                            'units': '°C',
                            'subValue': (current_temp | round(1) | string) if current_temp is not none else '',
                            'subUnits': '°C'
                          },
                          'state': 'off' if is_state(entity, 'off') else 'on',
                          'thermostat': {
                            'modeList': ['Off', 'On'],
                            'mode': mode,
                            'targetTemperature': target_value,
                            'currentTemperature': current_value,
                            'units': '°C'
                          },
                          'subLabel': states(entity)
                        } %}
                      {% elif domain == 'light' %}
                        {% set supported_modes = state_attr(entity, 'supported_color_modes') or [] %}
                        {% set has_rgb = 'hs' in supported_modes or 'xy' in supported_modes or 'rgb' in supported_modes %}
                        {% set has_ct = 'color_temp' in supported_modes %}
                        {% if has_rgb or has_ct %}
                          {% set brightness = state_attr(entity, 'brightness') or 0 %}
                          {% set brightness_pct = ((brightness * 100 / 255) | round(0)) | int(0) %}
                          {% set color_mode = state_attr(entity, 'color_mode') %}
                          {% if has_ct and color_mode == 'color_temp' %}
                            {% set color_temp = state_attr(entity, 'color_temp_kelvin') or 4000 %}
                            {% set tile_update.value = {
                              'screen': repeat.item.screen,
                              'tile': repeat.item.tile,
                              'state': 'on' if is_state(entity, 'on') else 'off',
                              'colorPicker': {
                                'mode': 'colorKelvin',
                                'colorKelvin': color_temp,
                                'brightness': brightness_pct
                              },
                              'subLabel': states(entity)
                            } %}
                          {% elif has_rgb %}
                            {% set rgb_color = state_attr(entity, 'rgb_color') or [255, 255, 255] %}
                            {% set tile_update.value = {
                              'screen': repeat.item.screen,
                              'tile': repeat.item.tile,
                              'state': 'on' if is_state(entity, 'on') else 'off',
                              'colorPicker': {
                                'mode': 'colorRgb',
                                'colorRgb': {
                                  'r': rgb_color[0] | int(0),
                                  'g': rgb_color[1] | int(0),
                                  'b': rgb_color[2] | int(0)
                                },
                                'colorKelvin': 0,
                                'brightness': brightness_pct
                              },
                              'subLabel': states(entity)
                            } %}
                          {% elif has_ct %}
                            {% set color_temp = state_attr(entity, 'color_temp_kelvin') or 4000 %}
                            {% set tile_update.value = {
                              'screen': repeat.item.screen,
                              'tile': repeat.item.tile,
                              'state': 'on' if is_state(entity, 'on') else 'off',
                              'colorPicker': {
                                'mode': 'colorKelvin',
                                'colorKelvin': color_temp,
                                'brightness': brightness_pct
                              },
                              'subLabel': states(entity)
                            } %}
                          {% else %}
                            {% set brightness_pct = ((brightness * 100 / 255) | round(0)) | int(0) %}
                            {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'state': 'on' if is_state(entity, 'on') else 'off', 'level': brightness_pct, 'subLabel': states(entity)} %}
                          {% endif %}
                        {% else %}
                          {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'state': 'on' if is_state(entity, 'on') else 'off'} %}
                        {% endif %}
                      {% else %}
                        {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'state': 'on' if is_state(entity, 'on') else 'off'} %}
                      {% endif %}
                      {{ {'tiles': [tile_update.value]} | to_json(ensure_ascii=False) }}
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'panel_stat' and trigger.payload_json.type == 'screen' and trigger.payload_json.state == 'loaded' }}"
        sequence:
          - delay:
              milliseconds: 100
          - repeat:
              for_each: "{{ tile_defs }}"
              sequence:
                - condition: template
                  value_template: "{{ repeat.item.entity and repeat.item.entity != '' and page_enabled_map.get(repeat.item.screen, page_enabled_map.get(repeat.item.screen | string, false)) }}"
                - action: mqtt.publish
                  data:
                    topic: "oxrs/cmnd/{{ device_client_id }}"
                    payload: >-
                      {% set entity = repeat.item.entity %}
                      {% set domain = entity.split('.')[0] %}
                      {% set tile_update = namespace(value={
                        'screen': repeat.item.screen,
                        'tile': repeat.item.tile
                      }) %}
                      {% if domain in ['sensor', 'binary_sensor'] %}
                        {% set sensor_text = (states(entity)
                          | replace('Ä', 'Ae')
                          | replace('Ö', 'Oe')
                          | replace('Ü', 'Ue')
                          | replace('ä', 'ae')
                          | replace('ö', 'oe')
                          | replace('ü', 'ue')
                          | replace('ß', 'ss')) %}
                        {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'text': sensor_text} %}
                      {% elif domain == 'cover' %}
                        {% set cover_level = state_attr(entity, 'current_position') %}
                        {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'state': 'on' if is_state(entity, 'open') else 'off', 'level': (cover_level | int(0)) if cover_level is not none else 0, 'subLabel': states(entity)} %}
                      {% elif domain == 'climate' %}
                        {% set target_temp = state_attr(entity, 'temperature') %}
                        {% set current_temp = state_attr(entity, 'current_temperature') %}
                        {% set target_value = ((target_temp * 10) | int(0)) if target_temp is not none else 200 %}
                        {% set current_value = ((current_temp * 10) | int(0)) if current_temp is not none else target_value %}
                        {% set mode = 1 if is_state(entity, 'off') else 2 %}
                        {% set tile_update.value = {
                          'screen': repeat.item.screen,
                          'tile': repeat.item.tile,
                          'number': {
                            'value': (target_temp | round(1) | string) if target_temp is not none else '',
                            'units': '°C',
                            'subValue': (current_temp | round(1) | string) if current_temp is not none else '',
                            'subUnits': '°C'
                          },
                          'state': 'off' if is_state(entity, 'off') else 'on',
                          'thermostat': {
                            'modeList': ['Off', 'On'],
                            'mode': mode,
                            'targetTemperature': target_value,
                            'currentTemperature': current_value,
                            'units': '°C'
                          },
                          'subLabel': states(entity)
                        } %}
                      {% elif domain == 'light' %}
                        {% set supported_modes = state_attr(entity, 'supported_color_modes') or [] %}
                        {% set has_rgb = 'hs' in supported_modes or 'xy' in supported_modes or 'rgb' in supported_modes %}
                        {% set has_ct = 'color_temp' in supported_modes %}
                        {% if has_rgb or has_ct %}
                          {% set brightness = state_attr(entity, 'brightness') or 0 %}
                          {% set brightness_pct = ((brightness * 100 / 255) | round(0)) | int(0) %}
                          {% set color_mode = state_attr(entity, 'color_mode') %}
                          {% if has_ct and color_mode == 'color_temp' %}
                            {% set color_temp = state_attr(entity, 'color_temp_kelvin') or 4000 %}
                            {% set tile_update.value = {
                              'screen': repeat.item.screen,
                              'tile': repeat.item.tile,
                              'state': 'on' if is_state(entity, 'on') else 'off',
                              'colorPicker': {
                                'mode': 'colorKelvin',
                                'colorKelvin': color_temp,
                                'brightness': brightness_pct
                              },
                              'subLabel': states(entity)
                            } %}
                          {% elif has_rgb %}
                            {% set rgb_color = state_attr(entity, 'rgb_color') or [255, 255, 255] %}
                            {% set tile_update.value = {
                              'screen': repeat.item.screen,
                              'tile': repeat.item.tile,
                              'state': 'on' if is_state(entity, 'on') else 'off',
                              'colorPicker': {
                                'mode': 'colorRgb',
                                'colorRgb': {
                                  'r': rgb_color[0] | int(0),
                                  'g': rgb_color[1] | int(0),
                                  'b': rgb_color[2] | int(0)
                                },
                                'colorKelvin': 0,
                                'brightness': brightness_pct
                              },
                              'subLabel': states(entity)
                            } %}
                          {% elif has_ct %}
                            {% set color_temp = state_attr(entity, 'color_temp_kelvin') or 4000 %}
                            {% set tile_update.value = {
                              'screen': repeat.item.screen,
                              'tile': repeat.item.tile,
                              'state': 'on' if is_state(entity, 'on') else 'off',
                              'colorPicker': {
                                'mode': 'colorKelvin',
                                'colorKelvin': color_temp,
                                'brightness': brightness_pct
                              },
                              'subLabel': states(entity)
                            } %}
                          {% else %}
                            {% set brightness_pct = ((brightness * 100 / 255) | round(0)) | int(0) %}
                            {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'state': 'on' if is_state(entity, 'on') else 'off', 'level': brightness_pct, 'subLabel': states(entity)} %}
                          {% endif %}
                        {% else %}
                          {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'state': 'on' if is_state(entity, 'on') else 'off'} %}
                        {% endif %}
                      {% else %}
                        {% set tile_update.value = {'screen': repeat.item.screen, 'tile': repeat.item.tile, 'state': 'on' if is_state(entity, 'on') else 'off'} %}
                      {% endif %}
                      {{ {'tiles': [tile_update.value]} | to_json(ensure_ascii=False) }}
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.id == 'panel_stat'
                 and (trigger.payload_json.type != 'screen'
                      or trigger.payload_json.state not in ['unloaded', 'loaded']) }}
        sequence:
          - variables:
              event_screen: "{{ trigger.payload_json.screen | default(0) | int(0) }}"
              event_tile: "{{ trigger.payload_json.tile | default(0) | int(0) }}"
              event_tag: "{{ trigger.payload_json.tag | default('', true) }}"
              event_type: "{{ trigger.payload_json.type | default('', true) }}"
              event_action: "{{ trigger.payload_json.event | default('', true) }}"
              matched_entity: >-
                {%- set by_tag = tile_defs | selectattr('entity', 'equalto', event_tag) | list -%}
                {%- if event_tag != '' and by_tag | length > 0 -%}
                  {{- by_tag[0].entity -}}
                {%- else -%}
                  {%- set by_pos = tile_defs | selectattr('screen', 'equalto', event_screen) | selectattr('tile', 'equalto', event_tile) | list -%}
                  {{- by_pos[0].entity if by_pos | length > 0 else '' -}}
                {%- endif -%}
              matched_domain: "{{ matched_entity.split('.')[0] if matched_entity else '' }}"
          - condition: template
            value_template: "{{ matched_entity != '' }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'light' and event_type == 'level' }}"
                sequence:
                  - variables:
                      event_level: "{{ trigger.payload_json.state | default(0, true) | int(0) }}"
                      event_brightness: "{{ ((event_level * 255 / 100) | round(0)) | int(0) }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ event_level <= 0 }}"
                        sequence:
                          - action: light.turn_off
                            target:
                              entity_id: "{{ matched_entity }}"
                    default:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ matched_entity }}"
                        data:
                          brightness: "{{ event_brightness }}"
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'cover' and event_type == 'level' }}"
                sequence:
                  - action: cover.set_cover_position
                    target:
                      entity_id: "{{ matched_entity }}"
                    data:
                      position: "{{ trigger.payload_json.state | default(0, true) | int(0) }}"
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain in ['light', 'switch', 'input_boolean', 'fan'] and event_type == 'button' and event_action == 'single' }}"
                sequence:
                  - action: homeassistant.toggle
                    target:
                      entity_id: "{{ matched_entity }}"
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain in ['scene', 'script'] and event_type == 'button' and event_action == 'single' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ matched_domain == 'scene' }}"
                        sequence:
                          - action: scene.turn_on
                            target:
                              entity_id: "{{ matched_entity }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ matched_domain == 'script' }}"
                        sequence:
                          - action: script.turn_on
                            target:
                              entity_id: "{{ matched_entity }}"
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'button' and event_type == 'button' and event_action == 'single' }}"
                sequence:
                  - action: button.press
                    target:
                      entity_id: "{{ matched_entity }}"
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'cover' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ trigger.payload_json.event | default('single') in ['up', 'open', 'single'] }}"
                        sequence:
                          - action: cover.open_cover
                            target:
                              entity_id: "{{ matched_entity }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ trigger.payload_json.event | default('single') in ['down', 'close'] }}"
                        sequence:
                          - action: cover.close_cover
                            target:
                              entity_id: "{{ matched_entity }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ trigger.payload_json.event | default('single') in ['hold', 'stop'] }}"
                        sequence:
                          - action: cover.stop_cover
                            target:
                              entity_id: "{{ matched_entity }}"
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'light' and event_type in ['colorPicker', 'tile'] }}"
                sequence:
                  - variables:
                      color_rgb: "{{ trigger.payload_json.state.colorRgb if trigger.payload_json.state.colorRgb is defined else {'r': 255, 'g': 0, 'b': 0} }}"
                      color_brightness_raw: "{{ trigger.payload_json.state.brightness | default(100, true) | int(0) if trigger.payload_json.state.brightness is defined else trigger.payload_json.brightness | default(100, true) | int(0) }}"
                      color_brightness: >-
                        {% set brightness_raw = color_brightness_raw | int(0) %}
                        {% if brightness_raw <= 100 %}
                          {{ ((brightness_raw * 255 / 100) | round(0)) | int(0) }}
                        {% else %}
                          {{ [brightness_raw, 255] | min }}
                        {% endif %}
                      color_kelvin: "{{ trigger.payload_json.state.colorKelvin | default(0, true) | int(0) if trigger.payload_json.state.colorKelvin is defined else trigger.payload_json.colorTemp | default(0, true) | int(0) }}"
                      color_red: "{{ color_rgb.r | default(0, true) | int(0) }}"
                      color_green: "{{ color_rgb.g | default(0, true) | int(0) }}"
                      color_blue: "{{ color_rgb.b | default(0, true) | int(0) }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ color_brightness_raw | int(0) == 0 or color_brightness | int(0) == 0 }}"
                        sequence:
                          - action: light.turn_off
                            target:
                              entity_id: "{{ matched_entity }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ color_kelvin | int(0) > 0 }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ matched_entity }}"
                            data:
                              brightness: "{{ color_brightness }}"
                              color_temp_kelvin: "{{ color_kelvin }}"
                    default:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ matched_entity }}"
                        data:
                          brightness: "{{ color_brightness }}"
                          rgb_color:
                            - "{{ color_red }}"
                            - "{{ color_green }}"
                            - "{{ color_blue }}"
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'climate' and event_type in ['thermostat', 'tile'] }}"
                sequence:
                  - variables:
                      target_temperature: >-
                        {% set state_payload = trigger.payload_json.state if trigger.payload_json.state is defined else {} %}
                        {{ (state_payload.targetTemperature | default(trigger.payload_json.targetTemperature | default(200, true), true) | int(0)) / 10.0 }}
                      thermostat_mode: >-
                        {% set state_payload = trigger.payload_json.state if trigger.payload_json.state is defined else {} %}
                        {{ state_payload.mode | default(trigger.payload_json.mode | default(1, true), true) | int(1) }}
                      hvac_on_mode: >-
                        {% set hvac_modes = state_attr(matched_entity, 'hvac_modes') or [] %}
                        {% if 'heat' in hvac_modes %}
                          heat
                        {% else %}
                          {% set ns = namespace(mode='heat') %}
                          {% for hvac_mode in hvac_modes %}
                            {% if hvac_mode != 'off' and ns.mode == 'heat' %}
                              {% set ns.mode = hvac_mode %}
                            {% endif %}
                          {% endfor %}
                          {{ ns.mode }}
                        {% endif %}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ thermostat_mode | int(1) in [0, 1] }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            continue_on_error: true
                            target:
                              entity_id: "{{ matched_entity }}"
                            data:
                              hvac_mode: "off"
                          - action: climate.turn_off
                            continue_on_error: true
                            target:
                              entity_id: "{{ matched_entity }}"
                    default:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: "{{ matched_entity }}"
                        data:
                          hvac_mode: "{{ hvac_on_mode | trim }}"
                      - action: climate.set_temperature
                        target:
                          entity_id: "{{ matched_entity }}"
                        data:
                          temperature: "{{ target_temperature }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain in ['sensor', 'binary_sensor'] }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {% set sensor_text = (states(matched_entity)
                          | replace('Ä', 'Ae')
                          | replace('Ö', 'Oe')
                          | replace('Ü', 'Ue')
                          | replace('ä', 'ae')
                          | replace('ö', 'oe')
                          | replace('ü', 'ue')
                          | replace('ß', 'ss')) %}
                        {{ {'tiles': [{'screen': event_screen, 'tile': event_tile, 'text': sensor_text}]} | to_json(ensure_ascii=False) }}
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'cover' }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {% set cover_level = state_attr(matched_entity, 'current_position') %}
                        {{ {'tiles': [{'screen': event_screen, 'tile': event_tile, 'state': 'on' if is_state(matched_entity, 'open') else 'off', 'level': (cover_level | int(0)) if cover_level is not none else 0, 'subLabel': states(matched_entity)}]} | to_json(ensure_ascii=False) }}
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'climate' }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {% set target_temp = target_temperature if target_temperature is defined else state_attr(matched_entity, 'temperature') %}
                        {% set current_temp = state_attr(matched_entity, 'current_temperature') %}
                        {% set target_value = ((target_temp * 10) | int(0)) if target_temp is not none else 200 %}
                        {% set current_value = ((current_temp * 10) | int(0)) if current_temp is not none else target_value %}
                        {% set mode = thermostat_mode if thermostat_mode is defined else 1 if is_state(matched_entity, 'off') else 2 %}
                        {% set mode = 1 if (mode | int(1)) in [0, 1] else 2 %}
                        {{ {'tiles': [{
                          'screen': event_screen,
                          'tile': event_tile,
                          'number': {
                            'value': (target_temp | round(1) | string) if target_temp is not none else '',
                            'units': '°C',
                            'subValue': (current_temp | round(1) | string) if current_temp is not none else '',
                            'subUnits': '°C'
                          },
                          'state': 'off' if mode == 1 else 'on',
                          'thermostat': {
                            'modeList': ['Off', 'On'],
                            'mode': mode,
                            'targetTemperature': target_value,
                            'currentTemperature': current_value,
                            'units': '°C'
                          },
                          'subLabel': 'off' if mode == 1 else 'on'
                        }]} | to_json(ensure_ascii=False) }}
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'light' }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {% set supported_modes = state_attr(matched_entity, 'supported_color_modes') or [] %}
                        {% set has_rgb = 'hs' in supported_modes or 'xy' in supported_modes or 'rgb' in supported_modes %}
                        {% set has_ct = 'color_temp' in supported_modes %}
                        {% set brightness = state_attr(matched_entity, 'brightness') or 0 %}
                        {% if has_rgb or has_ct %}
                          {% set brightness_pct = ((brightness * 100 / 255) | round(0)) | int(0) %}
                          {% set color_mode = state_attr(matched_entity, 'color_mode') %}
                          {% if has_ct and color_mode == 'color_temp' %}
                            {% set color_temp = state_attr(matched_entity, 'color_temp_kelvin') or 4000 %}
                            {% set tile_update = {
                              'screen': event_screen,
                              'tile': event_tile,
                              'state': 'on' if is_state(matched_entity, 'on') else 'off',
                              'colorPicker': {
                                'mode': 'colorKelvin',
                                'colorKelvin': color_temp,
                                'brightness': brightness_pct
                              },
                              'subLabel': states(matched_entity)
                            } %}
                          {% else %}
                            {% set rgb_color = state_attr(matched_entity, 'rgb_color') or [255, 255, 255] %}
                            {% set tile_update = {
                              'screen': event_screen,
                              'tile': event_tile,
                              'state': 'on' if is_state(matched_entity, 'on') else 'off',
                              'colorPicker': {
                                'mode': 'colorRgb',
                                'colorRgb': {
                                  'r': rgb_color[0] | int(0),
                                  'g': rgb_color[1] | int(0),
                                  'b': rgb_color[2] | int(0)
                                },
                                'colorKelvin': 0,
                                'brightness': brightness_pct
                              },
                              'subLabel': states(matched_entity)
                            } %}
                          {% endif %}
                          {{ {'tiles': [tile_update]} | to_json(ensure_ascii=False) }}
                        {% else %}
                          {% set brightness_pct = ((brightness * 100 / 255) | round(0)) | int(0) %}
                          {{ {'tiles': [{'screen': event_screen, 'tile': event_tile, 'state': 'on' if is_state(matched_entity, 'on') else 'off', 'level': brightness_pct, 'subLabel': states(matched_entity)}]} | to_json(ensure_ascii=False) }}
                        {% endif %}
              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain in ['light', 'switch', 'input_boolean', 'fan', 'scene', 'script', 'button'] }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {{ {'tiles': [{'screen': event_screen, 'tile': event_tile, 'state': 'on' if is_state(matched_entity, 'on') else 'off'}]} | to_json(ensure_ascii=False) }}
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'entity_state_changed' }}"
        sequence:
          - variables:
              changed_entity: "{{ trigger.event.data.entity_id | default('', true) }}"
              changed_state: "{{ trigger.event.data.new_state.state if trigger.event.data.new_state is not none else '' }}"
              changed_domain: "{{ changed_entity.split('.')[0] if changed_entity else '' }}"
              matched_entity: >-
                {%- set by_entity = tile_defs | selectattr('entity', 'equalto', changed_entity) | list -%}
                {{- by_entity[0].entity if by_entity | length > 0 else '' -}}
              event_screen: >-
                {%- set by_entity = tile_defs | selectattr('entity', 'equalto', changed_entity) | list -%}
                {{- by_entity[0].screen if by_entity | length > 0 else 0 -}}
              event_tile: >-
                {%- set by_entity = tile_defs | selectattr('entity', 'equalto', changed_entity) | list -%}
                {{- by_entity[0].tile if by_entity | length > 0 else 0 -}}
          - condition: template
            value_template: >-
              {{ matched_entity
                 and (event_screen | int(0)) > 0
                 and page_enabled_map.get(event_screen | int(0), page_enabled_map.get((event_screen | int(0)) | string, false))
                 and trigger.event.data.new_state is not none
                 and (trigger.event.data.old_state is none
                      or trigger.event.data.old_state.state != trigger.event.data.new_state.state
                      or changed_domain == 'climate') }}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ changed_domain in ['sensor', 'binary_sensor'] }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {% set raw_text = changed_state if changed_state not in ['unknown', 'unavailable'] else states(matched_entity) %}
                        {% set sensor_text = (raw_text
                          | replace('Ä', 'Ae')
                          | replace('Ö', 'Oe')
                          | replace('Ü', 'Ue')
                          | replace('ä', 'ae')
                          | replace('ö', 'oe')
                          | replace('ü', 'ue')
                          | replace('ß', 'ss')) %}
                        {{ {'tiles': [{'screen': event_screen, 'tile': event_tile, 'text': sensor_text}]} | to_json(ensure_ascii=False) }}
              - conditions:
                  - condition: template
                    value_template: "{{ changed_domain == 'cover' }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {% set cover_level = state_attr(matched_entity, 'current_position') %}
                        {{ {'tiles': [{'screen': event_screen, 'tile': event_tile, 'state': 'on' if changed_state == 'open' else 'off', 'level': (cover_level | int(0)) if cover_level is not none else 0, 'subLabel': changed_state}]} | to_json(ensure_ascii=False) }}
              - conditions:
                  - condition: template
                    value_template: "{{ changed_domain == 'climate' }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {% set target_temp = state_attr(matched_entity, 'temperature') %}
                        {% set current_temp = state_attr(matched_entity, 'current_temperature') %}
                        {% set target_value = ((target_temp * 10) | int(0)) if target_temp is not none else 200 %}
                        {% set current_value = ((current_temp * 10) | int(0)) if current_temp is not none else target_value %}
                        {% set mode = 1 if changed_state == 'off' else 2 %}
                        {{ {'tiles': [{
                          'screen': event_screen,
                          'tile': event_tile,
                          'number': {
                            'value': (target_temp | round(1) | string) if target_temp is not none else '',
                            'units': '°C',
                            'subValue': (current_temp | round(1) | string) if current_temp is not none else '',
                            'subUnits': '°C'
                          },
                          'state': 'off' if changed_state == 'off' else 'on',
                          'thermostat': {
                            'modeList': ['Off', 'On'],
                            'mode': mode,
                            'targetTemperature': target_value,
                            'currentTemperature': current_value,
                            'units': '°C'
                          },
                          'subLabel': changed_state
                        }]} | to_json(ensure_ascii=False) }}
              - conditions:
                  - condition: template
                    value_template: "{{ changed_domain == 'light' }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {% set supported_modes = state_attr(matched_entity, 'supported_color_modes') or [] %}
                        {% set has_rgb = 'hs' in supported_modes or 'xy' in supported_modes or 'rgb' in supported_modes %}
                        {% set has_ct = 'color_temp' in supported_modes %}
                        {% set brightness = state_attr(matched_entity, 'brightness') or 0 %}
                        {% if has_rgb or has_ct %}
                          {% set brightness_pct = ((brightness * 100 / 255) | round(0)) | int(0) %}
                          {% set color_mode = state_attr(matched_entity, 'color_mode') %}
                          {% if has_ct and color_mode == 'color_temp' %}
                            {% set color_temp = state_attr(matched_entity, 'color_temp_kelvin') or 4000 %}
                            {% set tile_update = {
                              'screen': event_screen,
                              'tile': event_tile,
                              'state': 'on' if changed_state == 'on' else 'off',
                              'colorPicker': {
                                'mode': 'colorKelvin',
                                'colorKelvin': color_temp,
                                'brightness': brightness_pct
                              },
                              'subLabel': changed_state
                            } %}
                          {% else %}
                            {% set rgb_color = state_attr(matched_entity, 'rgb_color') or [255, 255, 255] %}
                            {% set tile_update = {
                              'screen': event_screen,
                              'tile': event_tile,
                              'state': 'on' if changed_state == 'on' else 'off',
                              'colorPicker': {
                                'mode': 'colorRgb',
                                'colorRgb': {
                                  'r': rgb_color[0] | int(0),
                                  'g': rgb_color[1] | int(0),
                                  'b': rgb_color[2] | int(0)
                                },
                                'colorKelvin': 0,
                                'brightness': brightness_pct
                              },
                              'subLabel': changed_state
                            } %}
                          {% endif %}
                          {{ {'tiles': [tile_update]} | to_json(ensure_ascii=False) }}
                        {% else %}
                          {% set brightness_pct = ((brightness * 100 / 255) | round(0)) | int(0) %}
                          {{ {'tiles': [{'screen': event_screen, 'tile': event_tile, 'state': 'on' if changed_state == 'on' else 'off', 'level': brightness_pct, 'subLabel': changed_state}]} | to_json(ensure_ascii=False) }}
                        {% endif %}
              - conditions:
                  - condition: template
                    value_template: "{{ changed_domain in ['light', 'switch', 'input_boolean', 'fan', 'scene', 'script', 'button'] }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "oxrs/cmnd/{{ device_client_id }}"
                      payload: >-
                        {{ {'tiles': [{'screen': event_screen, 'tile': event_tile, 'state': 'on' if changed_state == 'on' else 'off'}]} | to_json(ensure_ascii=False) }}

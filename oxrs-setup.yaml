              - conditions:
                  - condition: template
                    value_template: "{{ matched_domain == 'light' and event_type in ['colorPicker', 'tile'] }}"
                sequence:
                  - variables:
                      color_rgb: "{{ trigger.payload_json.state.colorRgb if trigger.payload_json.state.colorRgb is defined else {'r': 255, 'g': 0, 'b': 0} }}"
                      color_brightness: "{{ trigger.payload_json.state.brightness | default(255, true) | int(0) if trigger.payload_json.state.brightness is defined else trigger.payload_json.brightness | default(255, true) | int(0) }}"
                      color_kelvin: "{{ trigger.payload_json.state.colorKelvin | default(6500, true) | int(0) if trigger.payload_json.state.colorKelvin is defined else trigger.payload_json.colorTemp | default(6500, true) | int(0) }}"
                      r_norm: "{{ (color_rgb.r | default(255, true) | int(0)) / 255.0 }}"
                      g_norm: "{{ (color_rgb.g | default(0, true) | int(0)) / 255.0 }}"
                      b_norm: "{{ (color_rgb.b | default(0, true) | int(0)) / 255.0 }}"
                      c_max: "{{ [r_norm, g_norm, b_norm] | max }}"
                      c_min: "{{ [r_norm, g_norm, b_norm] | min }}"
                      delta: "{{ c_max - c_min }}"
                      hue_raw: >-
                        {% if delta == 0 %} 0
                        {% elif c_max == r_norm %} {{ (60 * (((g_norm - b_norm) / delta) % 6)) | round(0) | int(0) }}
                        {% elif c_max == g_norm %} {{ (60 * (((b_norm - r_norm) / delta) + 2)) | round(0) | int(0) }}
                        {% else %} {{ (60 * (((r_norm - g_norm) / delta) + 4)) | round(0) | int(0) }}

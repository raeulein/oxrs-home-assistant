blueprint:
  name: OXRS Touchpanel setup
  description: Configures up to 5 OXRS touch panel screens from Home Assistant entities via MQTT.
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  input:
    common:
      name: Common
      collapsed: true
      icon: mdi:lan-connect
      input:
        device_client_id:
          name: MQTT device client id
          description: The OXRS device client id used in conf/<id>, cmnd/<id>, and stat/<id>.
          default: oxrs-01
          selector:
            text:
        thermostat_use_area_name:
          name: Show area name for thermostats
          description: Use the Home Assistant area name instead of the entity name for climate tiles when an area is assigned.
          default: false
          selector:
            boolean:
        temperature_sensor_use_area_name:
          name: Show area name for temperature and humidity sensors
          description: Use the Home Assistant area name instead of the entity name for temperature or humidity sensor tiles when an area is assigned.
          default: false
          selector:
            boolean:
    panel_options:
      name: Panel options
      description: Optional device settings and footer content. Nothing in this group is sent unless the related option is enabled.
      icon: mdi:tablet-dashboard
      collapsed: true
      input:
        display_timeout_enabled:
          name: Set display timeout
          default: false
          selector:
            boolean:
        display_timeout_seconds:
          name: Display timeout seconds
          default: 60
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: s
              mode: box
        backlight_enabled:
          name: Set backlight brightness
          default: false
          selector:
            boolean:
        backlight_brightness:
          name: Backlight brightness
          default: 100
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
              mode: slider
        footer_enabled:
          name: Enable footer updates
          description: Sends footer content on setup and updates it once per minute. Entity footer fields also update when the selected entity changes.
          default: false
          selector:
            boolean:
        date_format:
          name: Date format
          description: Format for date display in footer. Use Python strftime format (e.g. %d.%m.%Y for 13.05.2026).
          default: "%a %d %b"
          selector:
            text:
        footer_left_mode:
          name: Footer left content
          default: date
          selector:
            select:
              mode: dropdown
              options:
                - label: Empty
                  value: empty
                - label: Page name
                  value: name
                - label: Date
                  value: date
                - label: Time
                  value: time
                - label: Entity value
                  value: entity
        footer_left_entity:
          name: Footer left entity
          default: ""
          selector:
            entity:
        footer_center_mode:
          name: Footer center content
          default: name
          selector:
            select:
              mode: dropdown
              options:
                - label: Empty
                  value: empty
                - label: Page name
                  value: name
                - label: Date
                  value: date
                - label: Time
                  value: time
                - label: Entity value
                  value: entity
        footer_center_entity:
          name: Footer center entity
          default: ""
          selector:
            entity:
        footer_right_mode:
          name: Footer right content
          default: time
          selector:
            select:
              mode: dropdown
              options:
                - label: Empty
                  value: empty
                - label: Page name
                  value: name
                - label: Date
                  value: date
                - label: Time
                  value: time
                - label: Entity value
                  value: entity
        footer_right_entity:
          name: Footer right entity
          default: ""
          selector:
            entity:
    page_1:
      name: Page 1
      description: Configure up to 6 tiles for page 1. Leave empty to skip.
      icon: mdi:numeric-1-box-multiple-outline
      collapsed: true
      input:
        page_1_label:
          name: Page 1 label
          default: Home
          selector:
            text:
        page_1_enabled:
          name: Enable page 1
          default: true
          selector:
            boolean:
        page_1_tile_1_entity:
          name: Tile 1 entity
          default: ""
          selector:
            entity:
        page_1_tile_1_secondary_entity: { name: Tile 1 secondary sensor, default: "", selector: { entity: {} } }
        page_1_tile_2_entity:
          name: Tile 2 entity
          default: ""
          selector:
            entity:
        page_1_tile_2_secondary_entity: { name: Tile 2 secondary sensor, default: "", selector: { entity: {} } }
        page_1_tile_3_entity:

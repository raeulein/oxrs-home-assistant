    {{ [
      {'screen': 1, 'tile': 1, 'entity': page_1_tile_1_entity, 'secondary': page_1_tile_1_secondary_entity},
      {'screen': 1, 'tile': 2, 'entity': page_1_tile_2_entity, 'secondary': page_1_tile_2_secondary_entity},
      {'screen': 1, 'tile': 3, 'entity': page_1_tile_3_entity, 'secondary': page_1_tile_3_secondary_entity},
      {'screen': 1, 'tile': 4, 'entity': page_1_tile_4_entity, 'secondary': page_1_tile_4_secondary_entity},
      {'screen': 1, 'tile': 5, 'entity': page_1_tile_5_entity, 'secondary': page_1_tile_5_secondary_entity},
      {'screen': 1, 'tile': 6, 'entity': page_1_tile_6_entity, 'secondary': page_1_tile_6_secondary_entity},
      {'screen': 2, 'tile': 1, 'entity': page_2_tile_1_entity, 'secondary': page_2_tile_1_secondary_entity},
      {'screen': 2, 'tile': 2, 'entity': page_2_tile_2_entity, 'secondary': page_2_tile_2_secondary_entity},
      {'screen': 2, 'tile': 3, 'entity': page_2_tile_3_entity, 'secondary': page_2_tile_3_secondary_entity},
      {'screen': 2, 'tile': 4, 'entity': page_2_tile_4_entity, 'secondary': page_2_tile_4_secondary_entity},
      {'screen': 2, 'tile': 5, 'entity': page_2_tile_5_entity, 'secondary': page_2_tile_5_secondary_entity},
      {'screen': 2, 'tile': 6, 'entity': page_2_tile_6_entity, 'secondary': page_2_tile_6_secondary_entity},
      {'screen': 3, 'tile': 1, 'entity': page_3_tile_1_entity, 'secondary': page_3_tile_1_secondary_entity},
      {'screen': 3, 'tile': 2, 'entity': page_3_tile_2_entity, 'secondary': page_3_tile_2_secondary_entity},
      {'screen': 3, 'tile': 3, 'entity': page_3_tile_3_entity, 'secondary': page_3_tile_3_secondary_entity},
      {'screen': 3, 'tile': 4, 'entity': page_3_tile_4_entity, 'secondary': page_3_tile_4_secondary_entity},
      {'screen': 3, 'tile': 5, 'entity': page_3_tile_5_entity, 'secondary': page_3_tile_5_secondary_entity},
      {'screen': 3, 'tile': 6, 'entity': page_3_tile_6_entity, 'secondary': page_3_tile_6_secondary_entity},
      {'screen': 4, 'tile': 1, 'entity': page_4_tile_1_entity, 'secondary': page_4_tile_1_secondary_entity},
      {'screen': 4, 'tile': 2, 'entity': page_4_tile_2_entity, 'secondary': page_4_tile_2_secondary_entity},
      {'screen': 4, 'tile': 3, 'entity': page_4_tile_3_entity, 'secondary': page_4_tile_3_secondary_entity},
      {'screen': 4, 'tile': 4, 'entity': page_4_tile_4_entity, 'secondary': page_4_tile_4_secondary_entity},
      {'screen': 4, 'tile': 5, 'entity': page_4_tile_5_entity, 'secondary': page_4_tile_5_secondary_entity},
      {'screen': 4, 'tile': 6, 'entity': page_4_tile_6_entity, 'secondary': page_4_tile_6_secondary_entity},
      {'screen': 5, 'tile': 1, 'entity': page_5_tile_1_entity, 'secondary': page_5_tile_1_secondary_entity},
      {'screen': 5, 'tile': 2, 'entity': page_5_tile_2_entity, 'secondary': page_5_tile_2_secondary_entity},
      {'screen': 5, 'tile': 3, 'entity': page_5_tile_3_entity, 'secondary': page_5_tile_3_secondary_entity},
      {'screen': 5, 'tile': 4, 'entity': page_5_tile_4_entity, 'secondary': page_5_tile_4_secondary_entity},
      {'screen': 5, 'tile': 5, 'entity': page_5_tile_5_entity, 'secondary': page_5_tile_5_secondary_entity},
      {'screen': 5, 'tile': 6, 'entity': page_5_tile_6_entity, 'secondary': page_5_tile_6_secondary_entity}
    ] }}
  configured_entities: >-
    {% set ns = namespace(items=[]) %}
    {% for tile in tile_defs %}
      {% if tile.entity and tile.entity != '' and page_enabled_map.get(tile.screen, page_enabled_map.get(tile.screen | string, false)) %}
        {% set ns.items = ns.items + [tile.entity] %}
        {% if tile.secondary is defined and tile.secondary and tile.secondary != '' and tile.entity.split('.')[0] == 'sensor' and tile.secondary.split('.')[0] == 'sensor' %}
          {% set ns.items = ns.items + [tile.secondary] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}
  footer_payload: >-
    {%- macro clean(value) -%}
      {{- (value | string
        | replace('Ä', 'Ae')
        | replace('Ö', 'Oe')
        | replace('Ü', 'Ue')
        | replace('ä', 'ae')
        | replace('ö', 'oe')
        | replace('ü', 'ue')
        | replace('ß', 'ss')) -}}
    {%- endmacro -%}
    {%- macro entity_value(entity) -%}
      {%- if entity and entity != '' -%}
        {%- set raw_value = states(entity) -%}
        {%- if raw_value in ['unknown', 'unavailable'] -%}
          {{- '' -}}
        {%- elif is_number(raw_value) -%}
          {%- set rounded_value = raw_value | float(0) | round(2) -%}
          {%- set value_text = ((rounded_value | int) | string) if rounded_value == (rounded_value | int) else (rounded_value | string) -%}
          {%- set units = state_attr(entity, 'unit_of_measurement') or '' -%}
          {{- value_text ~ units -}}
        {%- else -%}
          {{- clean(raw_value) -}}
        {%- endif -%}
      {%- else -%}
        {{- '' -}}
      {%- endif -%}
    {%- endmacro -%}
    {%- macro footer_value(mode, screen, entity, date_fmt) -%}
      {%- if mode == 'name' -%}
        {{- clean(page_labels.get(screen, 'Page ' ~ screen) | string) -}}
      {%- elif mode == 'date' -%}
        {{- now().strftime(date_fmt) -}}
      {%- elif mode == 'time' -%}
        {{- now().strftime('%H:%M') -}}
      {%- elif mode == 'entity' -%}
        {{- entity_value(entity) -}}
      {%- else -%}
        {{- '' -}}
      {%- endif -%}
    {%- endmacro -%}
    {%- set ns = namespace(screens=[]) -%}
    {%- for screen in range(1, 6) -%}
      {%- if page_enabled_map.get(screen, page_enabled_map.get(screen | string, false)) -%}
        {%- set footer = {
          'left': footer_value(footer_left_mode, screen, footer_left_entity, date_format),
          'center': footer_value(footer_center_mode, screen, footer_center_entity, date_format),
          'right': footer_value(footer_right_mode, screen, footer_right_entity, date_format)
        } -%}
        {%- set ns.screens = ns.screens + [{'screen': screen, 'footer': footer}] -%}
      {%- endif -%}
    {%- endfor -%}
    {{- {'screens': ns.screens} | to_json(ensure_ascii=False) -}}


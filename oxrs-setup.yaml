    1: !input page_1_label
    2: !input page_2_label
    3: !input page_3_label
    4: !input page_4_label
    5: !input page_5_label
  page_enabled_map:
    1: !input page_1_enabled
    2: !input page_2_enabled
    3: !input page_3_enabled
    4: !input page_4_enabled
    5: !input page_5_enabled

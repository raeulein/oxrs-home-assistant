blueprint:
  name: OXRS Touchpanel setup
  description: Configure up to 5 OXRS touch panel screens from Home Assistant entities and resend the full MQTT configuration when the panel comes online.
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  input:
    common:
      name: Common
      icon: mdi:lan-connect
      input:
        device_client_id:
          name: MQTT device client id
          description: The OXRS device client id used in conf/<id>, cmnd/<id>, and stat/<id>.
          default: oxrs-01
          selector:
            text:
        page_1_label:
          name: Page 1 label
          default: Page 1
          selector:
            text:
        page_2_label:
          name: Page 2 label
          default: Page 2
          selector:
            text:
        page_3_label:
          name: Page 3 label
          default: Page 3
          selector:
            text:
        page_4_label:
          name: Page 4 label
          default: Page 4
          selector:
            text:
        page_5_label:
          name: Page 5 label
          default: Page 5
          selector:
            text:
    page_1:
      name: Page 1 tiles
      description: Configure up to 6 tiles for page 1. Leave empty to skip.
      icon: mdi:numeric-1-box-multiple-outline
      collapsed: true
      input:
        page_1_enabled:
          name: Enable page 1
          default: true
          selector:
            boolean:
        page_1_tile_1_entity:
          name: Tile 1 entity
          default: ""
          selector:
            entity:
        page_1_tile_2_entity:
          name: Tile 2 entity
          default: ""
          selector:
            entity:
        page_1_tile_3_entity:
          name: Tile 3 entity
          default: ""
          selector:
            entity:
        page_1_tile_4_entity:
          name: Tile 4 entity
          default: ""
          selector:
            entity:
        page_1_tile_5_entity:
          name: Tile 5 entity
          default: ""
          selector:
            entity:
        page_1_tile_6_entity:
          name: Tile 6 entity
          default: ""
